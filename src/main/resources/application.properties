spring.application.name=backend

# --- MySQL: actualiza URL, usuario y contraseña según tu entorno ---
spring.datasource.url=jdbc:mysql://localhost:3307/mydatabase?useSSL=false&serverTimezone=UTC
spring.datasource.username=myuser
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT (HS256): clave >= 32 caracteres ASCII
jwt.secret=ClaveSuperSecretaParaJWT_HS256_Minimo32Caracteres!!
jwt.expiration-ms=86400000

# --- Correo (ajusta para envío real; con dummy no se conecta a SMTP) ---
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=myuser
spring.mail.password=password
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
# Email "cliente" simulado si no hay correo en la factura
app.mail.from=noreply@veterinaria.local
app.mail.cliente-default=cliente@ejemplo.com

logging.level.org.springframework.security=INFO
logging.level.com.duoc.backend=DEBUG
server.servlet.session.cookie.same-site=strict
server.servlet.session.cookie.secure=false
server.servlet.session.cookie.http-only=true