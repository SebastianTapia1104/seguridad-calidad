<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
    <meta charset="UTF-8"/>
    <title>Ingresar - Patitas DUOC</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
    
    <div th:replace="~{fragments/navbar :: header}"></div>

    <main class="login-wrap">
        <h1 style="text-align: center; margin-bottom: 0.5rem;">Ingreso administrador</h1>
        <p style="color:var(--muted); text-align: center; margin-bottom: 2rem;">
            Usa el usuario <code>admin</code> y tu contraseña.
        </p>

        <form class="box" th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            
            <label>
                Usuario
                <input type="text" name="username" autocomplete="username" required/>
            </label>
            
            <label>
                Contraseña
                <input type="password" name="password" autocomplete="current-password" required/>
            </label>
            
            <p class="error" th:if="${param.error}">Credenciales incorrectas.</p>
            <p class="flash" th:if="${param.logout}">Has cerrado sesión exitosamente.</p>
            
            <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Entrar</button>
        </form>
    </main>

</body>
</html>
