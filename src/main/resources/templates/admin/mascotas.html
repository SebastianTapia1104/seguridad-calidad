<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin — Mascotas</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

  <div th:replace="~{fragments/navbar :: header}"></div>

  <main>
    <div class="flash" th:if="${msg}" th:text="${msg}" style="background-color: #4CAF50; padding: 10px; border-radius: 4px; margin-bottom: 15px;"></div>
    
    <h1>Gestión de mascotas</h1>
    
    <section>
      <h2 th:text="${form.id != null ? 'Editar mascota' : 'Nueva mascota'}">Formulario</h2>
      <form class="box" th:action="@{/admin/mascotas/guardar}" th:object="${form}" method="post">
        
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
        <input type="hidden" th:field="*{id}" th:if="${form.id != null}"/>
        
        <label>Nombre</label>
        <input type="text" th:field="*{nombre}" required/>
        
        <label>Especie</label>
        <input type="text" th:field="*{especie}" required/>
        
        <label>Raza</label>
        <input type="text" th:field="*{raza}"/>
        
        <label>Edad</label>
        <input type="number" th:field="*{edad}" min="0" required/>
        
        <label>Género</label>
        <select th:field="*{genero}">
          <option th:each="g : ${generos}" th:value="${g}" th:text="${g}"></option>
        </select>
        
        <label>Ubicación</label>
        <input type="text" th:field="*{ubicacion}" required/>
        
        <label>Estado adopción</label>
        <select th:field="*{estadoAdopcion}">
          <option th:each="e : ${estados}" th:value="${e}" th:text="${e}"></option>
        </select>
        
        <label>URL foto</label>
        <input type="url" th:field="*{fotoUrl}" placeholder="https://..."/>
        
        <button type="submit">Guardar</button>
        <a class="btn secondary" th:href="@{/admin/mascotas}" th:if="${form.id != null}">Cancelar edición</a>
      </form>
    </section>

    <section style="margin-top:3rem">
      <h2>Listado de Mascotas</h2>
      <table>
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Especie</th>
            <th>Edad</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="m : ${mascotas}">
            <td th:text="${m.nombre}"></td>
            <td th:text="${m.especie}"></td>
            <td th:text="${m.edad}"></td>
            <td th:text="${m.estadoAdopcion}"></td>
            <td>
              <a class="btn secondary" th:href="@{/admin/mascotas(edit=${m.id})}">Editar</a>
              <form th:action="@{/admin/mascotas/{id}/eliminar(id=${m.id})}" method="post" style="display:inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="danger" onclick="return confirm('¿Estás seguro de eliminar esta mascota?');">Eliminar</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

</body>
</html>
