# Integración: BD en memoria (no requiere MySQL local)
spring.datasource.url=jdbc:h2:mem:veterinaria_test;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop

jwt.secret=ClaveSuperSecretaParaJWT_HS256_Minimo32Caracteres!!
jwt.expiration-ms=86400000

spring.mail.host=localhost
spring.mail.port=1025

app.mail.from=noreply@test.local
app.mail.cliente-default=cliente@test.local

# Mensajes de validación deterministas en tests
spring.web.locale=en_US
